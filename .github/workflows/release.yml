name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  # --- Job 1: Build (GitHub-hosted) ---
  build:
    name: Build (Ubuntu 22.04 / ROCm / gfx1100)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    outputs:
      archive_name: ${{ steps.package.outputs.archive_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ROCm 7.1 dev packages
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -q -O - https://repo.radeon.com/rocm/rocm.gpg.key | \
            gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          # Pin AMD repo higher than Ubuntu/Microsoft repos that ship ROCm 5.x
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/7.1.1/ jammy main" | \
            sudo tee /etc/apt/sources.list.d/rocm.list
          printf 'Package: *\nPin: origin repo.radeon.com\nPin-Priority: 600\n' | \
            sudo tee /etc/apt/preferences.d/rocm-pin-600 > /dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            hip-dev rocm-dev hipblas-dev rocblas-dev cmake build-essential

      - name: Configure CMake
        run: |
          cmake -B build \
            -DGGML_HIP=ON \
            -DAMDGPU_TARGETS=gfx1100 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Dispatch site check
        run: scripts/check-dispatch-sites.sh

      - name: Install to staging
        run: cmake --install build --prefix staging

      - name: Package release archive
        id: package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE_DIR="kuzco.cpp-${TAG}-ubuntu-22.04-rocm-gfx1100"
          mkdir -p "${ARCHIVE_DIR}/bin" "${ARCHIVE_DIR}/lib"

          BINARIES=(
            llama-cli
            llama-server
            llama-bench
            llama-quantize
            llama-perplexity
            llama-completion
          )
          for bin in "${BINARIES[@]}"; do
            if [ -f "staging/bin/${bin}" ]; then
              cp "staging/bin/${bin}" "${ARCHIVE_DIR}/bin/"
            else
              echo "::warning::Binary ${bin} not found in staging/bin/"
            fi
          done

          LIBS=(
            libllama.so
            libggml.so
            libggml-base.so
            libggml-hip.so
            libggml-cpu.so
            libmtmd.so
          )
          for lib in "${LIBS[@]}"; do
            for f in staging/lib/${lib}*; do
              if [ -e "$f" ]; then
                cp -a "$f" "${ARCHIVE_DIR}/lib/"
              fi
            done
          done

          find "${ARCHIVE_DIR}/bin" -type f -executable -exec strip --strip-unneeded {} +
          find "${ARCHIVE_DIR}/lib" -type f -name '*.so*' -exec strip --strip-unneeded {} +

          cp LICENSE "${ARCHIVE_DIR}/"
          cp ci/release-build/README-release.txt "${ARCHIVE_DIR}/README.txt"

          tar czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}"
          echo "archive_name=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(awk -v tag="${TAG}" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              if (index($0, "## " tag) == 1) found=1
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="## ${TAG}

          Release ${TAG} of kuzco.cpp — T-MAC GEMV kernels for AMD RDNA3.

          See [CHANGELOG.md](https://github.com/nemekath/kuzco.cpp/blob/${TAG}/CHANGELOG.md) for details."
          fi

          echo "$NOTES" > release-notes.md

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: ${{ steps.package.outputs.archive_name }}
          retention-days: 7

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 7

  # --- Job 2: Publish Release ---
  # GPU verification runs locally before tag push (scripts/release-validate.sh).
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            "${ARCHIVE_NAME}" \
            --repo "${GH_REPO}" \
            --title "kuzco.cpp ${TAG}" \
            --notes-file release-notes.md
