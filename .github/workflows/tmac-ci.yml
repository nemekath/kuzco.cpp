name: T-MAC CI

on:
  push:
    branches: [tmac-dev]
    paths:
      - 'ggml/src/ggml-cuda/tmac.*'
      - 'scripts/tmac-regression.sh'
      - 'scripts/check-dispatch-sites.sh'
      - '.github/workflows/tmac-ci.yml'
  pull_request:
    branches: [tmac-dev]
    paths:
      - 'ggml/src/ggml-cuda/tmac.*'
      - 'scripts/tmac-regression.sh'
      - 'scripts/check-dispatch-sites.sh'
      - '.github/workflows/tmac-ci.yml'

jobs:
  # Tier 1: Build-only (GitHub-hosted runner, no GPU needed)
  build-hip:
    name: HIP Build (gfx1100)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ROCm dev packages
        run: |
          # Add ROCm repository
          wget -q -O - https://repo.radeon.com/rocm/rocm.gpg.key | sudo apt-key add -
          echo "deb [arch=amd64] https://repo.radeon.com/rocm/apt/6.3/ jammy main" | \
            sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            hip-dev rocm-dev cmake build-essential

      - name: Configure CMake
        run: |
          cmake -B build \
            -DGGML_HIP=ON \
            -DAMDGPU_TARGETS=gfx1100 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Dispatch site check
        run: scripts/check-dispatch-sites.sh

  # Tier 2: GPU regression (self-hosted runner, deferred)
